<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Todo App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class="container">
        <header>
            <h1>My Daily Tasks</h1>
            <p id="date-display"></p>
        </header>

        <section class="input-section">
            <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." aria-label="할 일 입력">
            <button id="add-btn" title="추가">
                <i class="fas fa-plus"></i>
            </button>
        </section>

        <section class="list-section">
            <ul id="todo-list" role="list">
                <!-- 할 일 항목이 여기에 동적으로 추가됩니다 -->
            </ul>
        </section>

        <footer>
            <div class="stats">
                <span id="pending-count">0</span> items left
            </div>
            <button id="clear-all" class="text-btn">모두 삭제</button>
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
